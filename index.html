<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐒 Vượn & Khỉ · Fuckk</title>
  <!-- Font chữ & icon đơn giản -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1e2b1f 0%, #2d3e2b 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    .card {
      max-width: 800px;
      width: 100%;
      background: rgba(255, 245, 225, 0.85);
      backdrop-filter: blur(4px);
      border-radius: 4.5rem 4.5rem 3rem 3rem;
      padding: 2.5rem 2.2rem 2.8rem;
      box-shadow: 0 30px 40px -15px rgba(0, 0, 0, 0.7),
                  inset 0 2px 5px rgba(255, 245, 200, 0.3);
      border: 2px solid #f7e3b2;
      transition: all 0.2s;
      text-align: center;
    }

    /* tiêu đề giật gân */
    .headline {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: baseline;
      gap: 0.4rem 1rem;
      margin-bottom: 2.2rem;
    }

    .headline h1 {
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #3d2b1a, #6b4f2c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 4px 10px rgba(90, 60, 30, 0.3);
      display: inline-block;
    }

    .headline .emoji-big {
      font-size: 3.8rem;
      line-height: 1;
      filter: drop-shadow(0 6px 6px rgba(0,0,0,0.2));
      transform: rotate(4deg);
    }

    .headline .fuckk-badge {
      background: #b3412b;
      padding: 0.3rem 1.5rem;
      border-radius: 60px;
      color: #ffe9c7;
      font-weight: 800;
      font-size: 2.1rem;
      letter-spacing: 2px;
      box-shadow: inset 0 -3px 0 #5f2419, 0 8px 0 #3b1d12;
      transform: rotate(-2deg) translateY(-4px);
      border: 1px solid #f7b889;
      text-shadow: 0 2px 0 #4f2a1a;
    }

    /* khu vực ảnh khỉ / vượn */
    .monkey-area {
      background: #d9c8a6;
      background-image: radial-gradient(circle at 20% 30%, #f1e4c9 2px, transparent 2px),
                        radial-gradient(circle at 80% 70%, #f1e4c9 2px, transparent 2px);
      background-size: 40px 40px;
      border-radius: 120px 120px 80px 80px;
      padding: 1.8rem 1rem 0.8rem;
      margin-bottom: 2rem;
      border: 6px solid #ae8d6b;
      box-shadow: inset 0 -10px 0 #7a6043, 0 16px 20px rgba(0, 0, 0, 0.3);
      transition: 0.15s;
    }

    .monkey-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-end;
      gap: 1.8rem 2.5rem;
    }

    .monkey-card {
      background: #fcf3e1;
      border-radius: 100px 100px 70px 70px;
      padding: 1.2rem 0.8rem 0.6rem;
      box-shadow: 0 12px 0 #816b4b, 0 15px 20px -5px #2d241a;
      border-bottom: 4px solid #b8956a;
      transform: rotate(0.5deg);
      transition: all 0.1s ease;
      flex: 0 1 auto;
      min-width: 160px;
    }

    .monkey-card:hover {
      transform: scale(1.02) rotate(-0.5deg);
      box-shadow: 0 10px 0 #6f5a3e, 0 20px 25px -5px #1c150e;
    }

    .monkey-img {
      width: 130px;
      height: 130px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.2));
      image-rendering: auto;
      transition: 0.15s;
    }

    /* ảnh dơ ngón giữa đặc biệt — dùng emoji + svg kết hợp */
    .middle-finger-emoji {
      font-size: 4.8rem;
      line-height: 1;
      display: block;
      margin: -0.2rem auto 0;
      filter: drop-shadow(0 6px 4px rgba(0,0,0,0.3));
      transform: rotate(10deg);
      text-shadow: 0 2px 0 #1b1b1b;
    }

    .monkey-name {
      font-weight: 800;
      font-size: 1.3rem;
      background: #4f3f2b;
      display: inline-block;
      padding: 0.2rem 1.2rem;
      border-radius: 60px;
      color: #f3e1c2;
      letter-spacing: -0.3px;
      margin-top: 0.2rem;
      border: 2px solid #e3c494;
      box-shadow: inset 0 -2px 0 #2f2419;
    }

    .caption-fuckk {
      margin-top: 2rem;
      font-size: 2.2rem;
      font-weight: 800;
      color: #2a1e12;
      background: #f5dbb1;
      padding: 0.6rem 1.8rem;
      border-radius: 80px;
      display: inline-block;
      border: 3px solid #b4814a;
      box-shadow: 0 6px 0 #7a5f3c;
      transform: rotate(-1deg);
      letter-spacing: 1px;
      backdrop-filter: blur(2px);
    }

    .caption-fuckk span {
      display: inline-block;
      transform: scale(1.4) rotate(12deg);
      margin: 0 8px;
      color: #bc3d28;
      text-shadow: 0 2px 0 #4f1c12;
    }

    .footnote {
      margin-top: 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #53412b;
      background: rgba(247, 225, 190, 0.7);
      padding: 0.5rem 1rem;
      border-radius: 60px;
      display: inline-block;
      backdrop-filter: blur(2px);
      border: 1px solid #dbbd93;
    }

    .footnote i {
      font-style: normal;
      background: #352b1d;
      color: #f0dbb8;
      padding: 0.1rem 0.8rem;
      border-radius: 30px;
      margin: 0 5px;
    }

    /* responsive */
    @media (max-width: 650px) {
      .card { padding: 1.8rem 1.2rem; }
      .headline h1 { font-size: 2.4rem; }
      .headline .fuckk-badge { font-size: 1.6rem; padding: 0.2rem 1rem; }
      .monkey-img { width: 100px; height: 100px; }
      .middle-finger-emoji { font-size: 3.8rem; }
      .monkey-card { min-width: 130px; }
      .caption-fuckk { font-size: 1.8rem; padding: 0.3rem 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- header bá đạo -->
    <div class="headline">
      <span class="emoji-big">🦧</span>
      <h1>Vượn · Khỉ</h1>
      <span class="fuckk-badge">FUCKK</span>
      <span class="emoji-big">🐒</span>
    </div>

    <!-- khu vực ảnh khỉ + ngón giữa -->
    <div class="monkey-area">
      <div class="monkey-grid">

        <!-- con vượn đầu tiên + ngón giữa (dơ ngons) -->
        <div class="monkey-card">
          <!-- ảnh vượn (dùng emoji + svg kết hợp để có ngón giữa) -->
          <div style="position: relative; display: inline-block;">
            <img class="monkey-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Ccircle cx='60' cy='50' r='40' fill='%23a57c52'/%3E%3Ccircle cx='45' cy='42' r='8' fill='%23f7e5c2'/%3E%3Ccircle cx='75' cy='42' r='8' fill='%23f7e5c2'/%3E%3Ccircle cx='48' cy='40' r='3' fill='%23221c14'/%3E%3Ccircle cx='72' cy='40' r='3' fill='%23221c14'/%3E%3Cellipse cx='60' cy='56' rx='12' ry='8' fill='%23c39b74'/%3E%3Cpath d='M40 80 Q60 95 80 80' stroke='%236b4f2e' stroke-width='5' fill='%23b5875a'/%3E%3C!-- tai --%3E%3Ccircle cx='28' cy='34' r='14' fill='%23a1754b'/%3E%3Ccircle cx='92' cy='34' r='14' fill='%23a1754b'/%3E%3C!-- ngón giữa (cách điệu) --%3E%3Crect x='73' y='10' width='14' height='28' rx='6' fill='%23d9ad7a' transform='rotate(15 80 24)'/%3E%3Crect x='70' y='6' width='20' height='10' rx='5' fill='%23d9ad7a' transform='rotate(15 80 11)'/%3E%3C/svg%3E" alt="Vượn giơ ngón giữa" style="width: 130px; height: 130px; object-fit: contain;">
            <!-- biểu tượng ngón giữa đè lên (cho rõ) -->
            <span class="middle-finger-emoji" style="position: absolute; bottom: -20px; right: -15px; font-size: 3.2rem; transform: rotate(30deg);">🖕</span>
          </div>
          <div class="monkey-name">🦧 Vượn</div>
        </div>

        <!-- con khỉ thứ hai + ngón giữa cách điệu -->
        <div class="monkey-card">
          <div style="position: relative; display: inline-block;">
            <img class="monkey-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Ccircle cx='60' cy='50' r='38' fill='%23b58b5f'/%3E%3Ccircle cx='46' cy='44' r='9' fill='%23eddcc3'/%3E%3Ccircle cx='74' cy='44' r='9' fill='%23eddcc3'/%3E%3Ccircle cx='49' cy='42' r='3.5' fill='%231f1a12'/%3E%3Ccircle cx='71' cy='42' r='3.5' fill='%231f1a12'/%3E%3Cellipse cx='60' cy='58' rx='13' ry='7' fill='%23c89f77'/%3E%3Cpath d='M38 78 Q60 94 82 78' stroke='%23674d2b' stroke-width='5' fill='%23b58b5f'/%3E%3Ccircle cx='26' cy='34' r='14' fill='%23a1754b'/%3E%3Ccircle cx='94' cy='34' r='14' fill='%23a1754b'/%3E%3C!-- ngón giữa khỉ --%3E%3Crect x='73' y='8' width='14' height='32' rx='6' fill='%23dbb58a' transform='rotate(20 80 24)'/%3E%3Crect x='70' y='2' width='20' height='10' rx='5' fill='%23dbb58a' transform='rotate(20 80 7)'/%3E%3C/svg%3E" alt="Khỉ giơ ngón giữa">
            <span class="middle-finger-emoji" style="position: absolute; bottom: -18px; right: -10px; font-size: 3rem; transform: rotate(20deg);">🖕</span>
          </div>
          <div class="monkey-name">🐒 Khỉ</div>
        </div>

        <!-- thêm 1 con vượn khác (phong phú) với ngón giữa to -->
        <div class="monkey-card">
          <div style="position: relative; display: inline-block;">
            <img class="monkey-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Ccircle cx='60' cy='48' r='42' fill='%239e7a54'/%3E%3Ccircle cx='44' cy='40' r='9' fill='%23f2e1ca'/%3E%3Ccircle cx='76' cy='40' r='9' fill='%23f2e1ca'/%3E%3Ccircle cx='47' cy='38' r='3.5' fill='%231c1710'/%3E%3Ccircle cx='73' cy='38' r='3.5' fill='%231c1710'/%3E%3Cellipse cx='60' cy='55' rx='13' ry='8' fill='%23b78b62'/%3E%3Cpath d='M38 78 Q58 96 82 78' stroke='%235f4729' stroke-width='5' fill='%23a57c54'/%3E%3Ccircle cx='24' cy='30' r='15' fill='%239e7a54'/%3E%3Ccircle cx='96' cy='30' r='15' fill='%239e7a54'/%3E%3C!-- ngón giữa đậm --%3E%3Crect x='73' y='6' width='16' height='34' rx='7' fill='%23dbb58a' transform='rotate(10 81 23)'/%3E%3Crect x='69' y='0' width='22' height='12' rx='6' fill='%23dbb58a' transform='rotate(10 80 6)'/%3E%3C/svg%3E" alt="Vượn đen giơ ngón">
            <span class="middle-finger-emoji" style="position: absolute; bottom: -25px; right: -20px; font-size: 3.8rem; transform: rotate(40deg);">🖕</span>
          </div>
          <div class="monkey-name">🦍 Đười ươi</div>
        </div>

      </div> <!-- end monkey-grid -->
    </div> <!-- end monkey-area -->

    <!-- lời nhắn “fuckk” đậm chất -->
    <div class="caption-fuckk">
      <span>🖕</span> Dơ ngons · FUCKK <span>🖕</span>
    </div>

    <!-- phụ đề hài hước -->
    <div class="footnote">
      <i>💢</i> vượn & khỉ giơ ngón giữa <i>💢</i> · 2026
    </div>
  </div>
</body>
</html>
