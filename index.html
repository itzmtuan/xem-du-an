<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>❤️ Lời tỏ tình ngọt ngào</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== TRÁI TIM BAY ===== */
        .heart-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .heart-rain .heart {
            position: absolute;
            font-size: 1.5rem;
            animation: fall linear infinite;
            opacity: 0.6;
        }
        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(0.5);
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }

        /* ===== BÓNG ĐÈN ===== */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 10s ease-in-out infinite alternate;
        }
        .glow-orb:nth-child(1) {
            width: 500px;
            height: 500px;
            background: rgba(236, 72, 153, 0.15);
            top: -200px;
            left: -200px;
        }
        .glow-orb:nth-child(2) {
            width: 400px;
            height: 400px;
            background: rgba(244, 63, 94, 0.12);
            bottom: -100px;
            right: -100px;
            animation-delay: -4s;
        }
        .glow-orb:nth-child(3) {
            width: 300px;
            height: 300px;
            background: rgba(251, 146, 60, 0.10);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -8s;
        }
        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(40px, -30px) scale(1.2);
            }
        }

        /* ===== CARD CHÍNH ===== */
        .container {
            position: relative;
            z-index: 10;
            max-width: 560px;
            width: 100%;
            padding: 1.5rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 3rem;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== ICON TRÁI TIM TO ===== */
        .big-heart {
            font-size: 4.5rem;
            display: block;
            animation: heartbeat 1.2s ease-in-out infinite;
            margin-bottom: 0.5rem;
        }
        @keyframes heartbeat {
            0%,
            100% {
                transform: scale(1);
            }
            15% {
                transform: scale(1.25);
            }
            30% {
                transform: scale(1);
            }
            45% {
                transform: scale(1.15);
            }
            60% {
                transform: scale(1);
            }
        }

        /* ===== TIÊU ĐỀ ===== */
        .title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f472b6, #fb7185, #f472b6);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 3s ease-in-out infinite;
            margin-bottom: 0.8rem;
        }
        @keyframes gradientMove {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        /* ===== LỜI TỎ TÌNH ===== */
        .message {
            color: #e2e8f0;
            font-size: 1.1rem;
            line-height: 1.8;
            margin: 1rem 0 1.5rem;
            padding: 0 0.5rem;
            opacity: 0.9;
        }
        .message .highlight {
            color: #f472b6;
            font-weight: 600;
        }

        /* ===== NÚT ===== */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            padding: 0.9rem 2.5rem;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            color: white;
            box-shadow: 0 4px 30px rgba(236, 72, 153, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 8px 50px rgba(236, 72, 153, 0.5);
        }
        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(10px);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        /* Ripple effect */
        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: rippleAnim 0.6s linear forwards;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* ===== PHẢN HỒI ===== */
        .response-area {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .response-area .text {
            color: #94a3b8;
            font-size: 1rem;
            transition: 0.3s;
        }
        .response-area .text.success {
            color: #34d399;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .response-area .text.error {
            color: #f87171;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            color: #475569;
            font-size: 0.75rem;
            margin-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 1.2rem;
            letter-spacing: 1px;
        }
        .footer .heart-small {
            color: #f472b6;
            animation: heartbeat 1.2s ease-in-out infinite;
            display: inline-block;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .glass-card {
                padding: 1.8rem 1.2rem;
                border-radius: 2rem;
            }
            .title {
                font-size: 2rem;
            }
            .big-heart {
                font-size: 3.5rem;
            }
            .message {
                font-size: 1rem;
            }
            .btn {
                padding: 0.7rem 1.8rem;
                font-size: 1rem;
            }
        }

        /* ===== HIỆU ỨNG BẮN PHÁO HOA ===== */
        .firework {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 2rem;
            animation: fireworkUp 2s ease-out forwards;
        }
        @keyframes fireworkUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.3) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-300px) scale(1.5) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <!-- ===== NỀN ===== -->
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>

    <!-- ===== TRÁI TIM BAY ===== -->
    <div class="heart-rain" id="heartRain"></div>

    <!-- ===== CARD CHÍNH ===== -->
    <div class="container">
        <div class="glass-card">

            <span class="big-heart">❤️</span>
            <h1 class="title">Anh yêu em!</h1>

            <p class="message">
                Từ ngày gặp em, trái tim anh như biết nhảy múa.<br />
                Mỗi khoảnh khắc bên em là một <span class="highlight">điều kỳ diệu</span>.<br />
                Em có đồng ý làm <span class="highlight">người yêu</span> của anh không? 💕
            </p>

            <div class="btn-group">
                <button class="btn btn-primary" id="btnYes">❤️ Đồng ý</button>
                <button class="btn btn-secondary" id="btnNo">😅 Để suy nghĩ...</button>
            </div>

            <div class="response-area" id="responseArea">
                <span class="text" id="responseText">💝 Anh đang chờ câu trả lời của em...</span>
            </div>

            <div class="footer">
                Làm với <span class="heart-small">❤️</span> dành tặng em · 2026
            </div>

        </div>
    </div>

    <script>
        // =============================================
        // 1. TRÁI TIM BAY
        // =============================================
        (function createHeartRain() {
            const container = document.getElementById('heartRain');
            const hearts = ['❤️', '💕', '💖', '💗', '💓', '♥️', '✨', '🌹', '💝'];
            const count = 30;

            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'heart';
                el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                el.style.animationDuration = (Math.random() * 8 + 6) + 's';
                el.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(el);
            }
        })();

        // =============================================
        // 2. NÚT "ĐỒNG Ý" - BẮN TIM + PHẢN HỒI
        // =============================================
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const responseText = document.getElementById('responseText');

        // Ripple effect cho cả 2 nút
        function addRipple(e) {
            const btn = e.currentTarget;
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        btnYes.addEventListener('click', function(e) {
            addRipple(e);

            // Hiển thị thông báo
            responseText.className = 'text success';
            responseText.textContent = '💖 Em đồng ý! Anh hạnh phúc quá! 💖';

            // Bắn pháo hoa tim
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    shootFirework();
                }, i * 100);
            }

            // Đổi màu nền card
            const card = document.querySelector('.glass-card');
            card.style.transition = 'border-color 0.5s, box-shadow 0.5s';
            card.style.borderColor = 'rgba(236, 72, 153, 0.3)';
            card.style.boxShadow = '0 40px 100px rgba(0,0,0,0.5), 0 0 60px rgba(236,72,153,0.05)';
        });

        // =============================================
        // 3. NÚT "ĐỂ SUY NGHĨ..." - TRỐN
        // =============================================
        btnNo.addEventListener('click', function(e) {
            addRipple(e);

            // Di chuyển nút sang vị trí ngẫu nhiên
            const maxX = window.innerWidth - btnNo.offsetWidth - 40;
            const maxY = window.innerHeight - btnNo.offsetHeight - 40;
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
            btnNo.style.zIndex = '100';

            // Đổi text
            btnNo.textContent = '😅 Đừng trốn mà!';

            // Thông báo
            responseText.className = 'text';
            responseText.textContent = '😏 Đừng có trốn nhé! Anh sẽ đợi...';

            // Sau 2s đưa nút về
            setTimeout(() => {
                btnNo.style.position = 'relative';
                btnNo.style.left = 'auto';
                btnNo.style.top = 'auto';
                btnNo.style.zIndex = 'auto';
                btnNo.textContent = '😅 Để suy nghĩ...';
            }, 1500);
        });

        // Bắt sự kiện hover để trốn tiếp
        btnNo.addEventListener('mouseenter', function() {
            if (responseText.textContent.includes('đồng ý')) return;
            const maxX = window.innerWidth - btnNo.offsetWidth - 40;
            const maxY = window.innerHeight - btnNo.offsetHeight - 40;
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
            btnNo.style.zIndex = '100';
            btnNo.textContent = '😈 Bắt được tôi đi!';
        });

        // =============================================
        // 4. BẮN PHÁO HOA TIM
        // =============================================
        function shootFirework() {
            const emojis = ['❤️', '💕', '💖', '💗', '💓', '♥️', '✨', '🌹', '💝', '🌸', '🌺'];
            const el = document.createElement('div');
            el.className = 'firework';
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = (Math.random() * 80 + 10) + '%';
            el.style.top = (Math.random() * 60 + 20) + '%';
            el.style.fontSize = (Math.random() * 2 + 1.5) + 'rem';
            el.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        // =============================================
        // 5. HIỆU ỨNG TỰ ĐỘNG BẮN TIM KHI TẢI TRANG
        // =============================================
        setTimeout(() => {
            for (let i = 0; i < 8; i++) {
                setTimeout(() => shootFirework(), i * 200 + 500);
            }
        }, 1000);

        // =============================================
        // 6. THEO DÕI CHUỘT CHO GLOW ORB
        // =============================================
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const orbs = document.querySelectorAll('.glow-orb');
            orbs.forEach((orb, i) => {
                const speed = 20 + i * 10;
                const moveX = (x - 0.5) * speed;
                const moveY = (y - 0.5) * speed;
                orb.style.transform = `translate(${moveX}px, ${moveY}px) scale(${1 + (x - 0.5) * 0.1})`;
            });
        });

        console.log('❤️ Trang tỏ tình đã sẵn sàng! Chúc bạn thành công!');
    </script>

</body>
</html>
