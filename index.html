<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐒 BỊ LỪA RỒI! - Meme đồ ngu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0a0a 50%, #0a0a0f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== NỀN ===== */
        .bg-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(200, 50, 50, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(200, 50, 50, 0.08) 0%, transparent 60%);
        }

        /* ===== CARD ===== */
        .container {
            position: relative;
            z-index: 10;
            max-width: 480px;
            width: 100%;
            padding: 1.5rem;
        }

        .card {
            background: rgba(20, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            padding: 2.5rem 2rem 2.8rem;
            border: 1px solid rgba(255, 50, 50, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 50, 50, 0.05);
            text-align: center;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ===== TIÊU ĐỀ ===== */
        .title {
            font-size: 2.2rem;
            font-weight: 900;
            color: #ff4444;
            text-shadow: 0 0 30px rgba(255, 50, 50, 0.3);
            margin-bottom: 0.3rem;
            letter-spacing: 2px;
        }
        .title .emoji {
            font-size: 2.8rem;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
            letter-spacing: 1px;
        }

        /* ===== ẢNH ===== */
        .image-wrapper {
            margin: 0 auto 1.5rem;
            border-radius: 1.8rem;
            overflow: hidden;
            border: 3px solid rgba(255, 50, 50, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 320px;
            aspect-ratio: 1/1;
            transition: 0.3s;
        }
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== NÚT ===== */
        .btn {
            padding: 0.9rem 2.5rem;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            background: linear-gradient(135deg, #cc3333, #ff4444);
            color: white;
            box-shadow: 0 4px 25px rgba(255, 50, 50, 0.3);
            letter-spacing: 1px;
        }
        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 35px rgba(255, 50, 50, 0.4);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== CHỮ BAY ===== */
        .flying-text {
            position: fixed;
            font-size: 3.5rem;
            font-weight: 900;
            color: #ff2222;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6), 0 0 60px rgba(255, 0, 0, 0.3), 3px 3px 0 #4d1a0e;
            pointer-events: none;
            z-index: 9999;
            animation: flyAround 4.5s linear forwards;
            white-space: nowrap;
            letter-spacing: 2px;
        }

        @keyframes flyAround {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.2) rotate(0deg);
            }
            10% {
                opacity: 1;
                transform: translate(40px, -80px) scale(1.2) rotate(10deg);
            }
            25% {
                transform: translate(-150px, 50px) scale(1) rotate(-15deg);
            }
            50% {
                transform: translate(200px, -120px) scale(1.3) rotate(18deg);
            }
            75% {
                transform: translate(-250px, 100px) scale(0.9) rotate(-25deg);
            }
            100% {
                opacity: 0;
                transform: translate(300px, -180px) scale(1.4) rotate(30deg);
            }
        }

        /* Lớp phủ mờ */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9997;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        /* Biểu tượng âm thanh */
        .sound-icon {
            display: inline-block;
            margin-left: 8px;
            animation: soundPulse 0.8s ease-in-out infinite;
        }
        @keyframes soundPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 500px) {
            .card {
                padding: 1.8rem 1.2rem 2rem;
                border-radius: 2rem;
            }
            .title {
                font-size: 1.7rem;
            }
            .title .emoji {
                font-size: 2.2rem;
            }
            .image-wrapper {
                max-width: 250px;
            }
            .btn {
                padding: 0.7rem 1.8rem;
                font-size: 1rem;
            }
            .flying-text {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 400px) {
            .image-wrapper {
                max-width: 200px;
            }
            .flying-text {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NỀN ===== -->
    <div class="bg-effect"></div>

    <!-- ===== CARD CHÍNH ===== -->
    <div class="container">
        <div class="card">
            <div class="title">
                <span class="emoji">🐒</span> BỊ LỪA RỒI!
                <span class="sound-icon">🔊</span>
            </div>
            <p class="subtitle">⚡ "Đồ ngu đồ ăn hại" + chữ bay ⚡</p>

            <!-- Ảnh con vượn -->
            <div class="image-wrapper">
                <img 
                    src="https://tse3.mm.bing.net/th/id/OIP.1XswuztcQnHn8lwz31z1MAHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3" 
                    alt="Con vượn"
                />
            </div>

            <!-- Nút -->
            <button class="btn" id="btnLua">😈 XEM NÀO</button>
        </div>
    </div>

    <script>
        // ============================================================
        // CÁCH 1: SỬ DỤNG FILE ÂM THANH CỤC BỘ (ƯU TIÊN)
        // Bạn tải file "do-ngu-do-an-hai.mp3" về cùng thư mục với file HTML
        // ============================================================
        const localSound = 'do-ngu-do-an-hai.mp3'; // 👈 Đặt tên file của bạn ở đây

        // ============================================================
        // CÁCH 2: SỬ DỤNG LINK DỰ PHÒNG (NẾU KHÔNG CÓ FILE CỤC BỘ)
        // ============================================================
        const fallbackSounds = [
            'https://www.myinstants.com/media/sounds/trollge.mp3',
            'https://www.myinstants.com/media/sounds/vine-boom.mp3',
            'https://www.myinstants.com/media/sounds/roblox-death-sound_1.mp3'
        ];

        let audio = null;
        let soundLoaded = false;

        // ============================================================
        // HÀM PHÁT NHẠC - THỬ TỪNG NGUỒN
        // ============================================================
        function playMemeSound() {
            try {
                // Nếu đã có audio và đang phát thì dừng
                if (audio && !audio.paused) {
                    audio.pause();
                    audio.currentTime = 0;
                }

                audio = new Audio();

                // THỬ FILE CỤC BỘ TRƯỚC
                audio.src = localSound;
                audio.volume = 0.8;

                // Nếu file cục bộ không tải được, thử các link dự phòng
                let fallbackIndex = 0;

                audio.onerror = function() {
                    console.log('Không tải được file cục bộ, thử link dự phòng...');
                    if (fallbackIndex < fallbackSounds.length) {
                        audio.src = fallbackSounds[fallbackIndex];
                        fallbackIndex++;
                        audio.load();
                        audio.play().catch(() => {
                            // Nếu vẫn lỗi, thử tiếp
                            audio.onerror();
                        });
                    } else {
                        console.log('❌ Không thể phát âm thanh nào');
                    }
                };

                audio.play().catch(() => {
                    // Nếu play thất bại, kích hoạt onerror
                    audio.onerror();
                });

                soundLoaded = true;

            } catch (e) {
                console.log('Lỗi phát nhạc:', e);
            }
        }

        // ============================================================
        // TẠO CHỮ BAY "BỊ LỪA RỒI!" + "ĐỒ NGU ĐỒ ĂN HẠI"
        // ============================================================
        function createFlyingText() {
            // Xóa các phần tử cũ
            document.querySelectorAll('.flying-text, .overlay').forEach(el => el.remove());

            // Tạo overlay
            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            document.body.appendChild(overlay);

            // Các biến thể câu chữ - THÊM "ĐỒ NGU ĐỒ ĂN HẠI"
            const phrases = [
                "BỊ LỪA RỒI!", 
                "HAHAHA!", 
                "BỊ LỪA RỒI!", 
                "ÔI TRỜI!", 
                "LỪA ĐẢO!", 
                "NGU NGƯỜI!",
                "BỊ LỪA RỒI!",
                "🤣🤣🤣",
                "THÔI RỒI!",
                "ĐỒ NGU ĐỒ ĂN HẠI!",  // 👈 THÊM VÀO
                "ĐỒ NGU!",
                "ĂN HẠI!",
                "BỊ LỪA RỒI!"
            ];

            // Tạo 30 chữ bay (tăng số lượng)
            for (let i = 0; i < 30; i++) {
                const el = document.createElement('div');
                el.className = 'flying-text';
                el.textContent = phrases[Math.floor(Math.random() * phrases.length)];
                
                // Vị trí ngẫu nhiên
                el.style.left = Math.random() * 85 + 5 + '%';
                el.style.top = Math.random() * 85 + 5 + '%';
                el.style.fontSize = (Math.random() * 3 + 2.5) + 'rem';
                el.style.animationDuration = (Math.random() * 3.5 + 3) + 's';
                el.style.animationDelay = (Math.random() * 1.8) + 's';
                el.style.transform = `rotate(${Math.random() * 60 - 30}deg)`;
                
                // Màu sắc đỏ cam
                const colors = ['#ff2222', '#ff4444', '#ff6633', '#ff5555', '#ff3333', '#ff7744', '#ffaa00'];
                el.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                document.body.appendChild(el);
            }

            // Tự động xóa sau 7 giây
            setTimeout(() => {
                document.querySelectorAll('.flying-text, .overlay').forEach(el => el.remove());
            }, 7000);
        }

        // ============================================================
        // NÚT BẤM - KÍCH HOẠT HIỆU ỨNG + NHẠC MEME
        // ============================================================
        const btnLua = document.getElementById('btnLua');

        btnLua.addEventListener('click', function() {
            // Phát nhạc meme "đồ ngu đồ ăn hại"
            playMemeSound();

            // Đổi text nút
            this.textContent = '🔊 ĐANG LỪA...';
            this.disabled = true;
            this.style.opacity = '0.6';

            // Kích hoạt chữ bay sau 0.2s
            setTimeout(() => {
                createFlyingText();
                
                // Đổi lại nút
                setTimeout(() => {
                    btnLua.textContent = '😈 LẠI NÀO!';
                    btnLua.disabled = false;
                    btnLua.style.opacity = '1';
                }, 3500);
            }, 200);
        });

        // ============================================================
        // TỰ ĐỘNG KÍCH HOẠT KHI VÀO TRANG
        // ============================================================
        setTimeout(() => {
            // Phát nhạc meme khi vào trang
            playMemeSound();
            
            createFlyingText();
            
            // Tự động kích hoạt lại sau 8 giây
            setInterval(() => {
                if (!btnLua.disabled) {
                    playMemeSound();
                    createFlyingText();
                }
            }, 8000);
        }, 500);

        // ============================================================
        // HƯỚNG DẪN CÁCH THÊM FILE NHẠC CỦA BẠN
        // ============================================================
        console.log('🐒 Trang lừa đảo với meme "đồ ngu đồ ăn hại" đã sẵn sàng!');
        console.log('📌 CÁCH THÊM NHẠC CỦA BẠN:');
        console.log('1. Tải file "do-ngu-do-an-hai.mp3" về từ SoundInstants');
        console.log('2. Đặt file cùng thư mục với file HTML này');
        console.log('3. Đổi tên file trong biến localSound (dòng 175) nếu cần');
        console.log('4. Mở lại trang web và tận hưởng!');
        console.log('🔊 Nhấn nút để nghe "ĐỒ NGU ĐỒ ĂN HẠI" + chữ bay!');
    </script>

</body>
</html>
