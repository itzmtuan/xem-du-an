<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐒 BỊ LỪA RỒI! - Tự động phát nhạc</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0a0a 50%, #0a0a0f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .bg-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(200, 50, 50, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(200, 50, 50, 0.08) 0%, transparent 60%);
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 480px;
            width: 100%;
            padding: 1.5rem;
        }

        .card {
            background: rgba(20, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            padding: 2.5rem 2rem 2.8rem;
            border: 1px solid rgba(255, 50, 50, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 50, 50, 0.05);
            text-align: center;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .title {
            font-size: 2.2rem;
            font-weight: 900;
            color: #ff4444;
            text-shadow: 0 0 30px rgba(255, 50, 50, 0.3);
            margin-bottom: 0.3rem;
            letter-spacing: 2px;
        }
        .title .emoji {
            font-size: 2.8rem;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
            letter-spacing: 1px;
        }

        .image-wrapper {
            margin: 0 auto 1.5rem;
            border-radius: 1.8rem;
            overflow: hidden;
            border: 3px solid rgba(255, 50, 50, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 320px;
            aspect-ratio: 1/1;
            transition: 0.3s;
        }
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== CHỮ BAY ===== */
        .flying-text {
            position: fixed;
            font-size: 3.5rem;
            font-weight: 900;
            color: #ff2222;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6), 0 0 60px rgba(255, 0, 0, 0.3), 3px 3px 0 #4d1a0e;
            pointer-events: none;
            z-index: 9999;
            animation: flyAround 4.5s linear forwards;
            white-space: nowrap;
            letter-spacing: 2px;
        }

        @keyframes flyAround {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.2) rotate(0deg);
            }
            10% {
                opacity: 1;
                transform: translate(40px, -80px) scale(1.2) rotate(10deg);
            }
            25% {
                transform: translate(-150px, 50px) scale(1) rotate(-15deg);
            }
            50% {
                transform: translate(200px, -120px) scale(1.3) rotate(18deg);
            }
            75% {
                transform: translate(-250px, 100px) scale(0.9) rotate(-25deg);
            }
            100% {
                opacity: 0;
                transform: translate(300px, -180px) scale(1.4) rotate(30deg);
            }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9997;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        .sound-icon {
            display: inline-block;
            margin-left: 8px;
            animation: soundPulse 0.8s ease-in-out infinite;
        }
        @keyframes soundPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Nút bấm vẫn giữ lại để dùng nếu muốn */
        .btn {
            padding: 0.9rem 2.5rem;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            background: linear-gradient(135deg, #cc3333, #ff4444);
            color: white;
            box-shadow: 0 4px 25px rgba(255, 50, 50, 0.3);
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }
        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 35px rgba(255, 50, 50, 0.4);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        @media (max-width: 500px) {
            .card {
                padding: 1.8rem 1.2rem 2rem;
                border-radius: 2rem;
            }
            .title {
                font-size: 1.7rem;
            }
            .title .emoji {
                font-size: 2.2rem;
            }
            .image-wrapper {
                max-width: 250px;
            }
            .btn {
                padding: 0.7rem 1.8rem;
                font-size: 1rem;
            }
            .flying-text {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 400px) {
            .image-wrapper {
                max-width: 200px;
            }
            .flying-text {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-effect"></div>

    <div class="container">
        <div class="card">
            <div class="title">
                <span class="emoji">🐒</span> BỊ LỪA RỒI!
                <span class="sound-icon">🔊</span>
            </div>
            <p class="subtitle">⚡ "Đồ ngu đồ ăn hại" tự động phát ⚡</p>

            <div class="image-wrapper">
                <img 
                    src="https://tse3.mm.bing.net/th/id/OIP.1XswuztcQnHn8lwz31z1MAHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3" 
                    alt="Con vượn"
                />
            </div>

            <!-- Vẫn giữ nút để nếu muốn bấm lại -->
            <button class="btn" id="btnLua">😈 BẤM LẠI NÀO</button>
        </div>
    </div>

    <script>
        // ============================================================
        // FILE NHẠC CỦA BẠN - Đặt tên file đúng ở đây
        // ============================================================
        const localSound = 'do-ngu-do-an-hai.mp3'; // 👈 Tên file của bạn

        // Link dự phòng nếu không có file cục bộ
        const fallbackSounds = [
            'https://www.myinstants.com/media/sounds/trollge.mp3',
            'https://www.myinstants.com/media/sounds/vine-boom.mp3'
        ];

        let audio = null;

        // ============================================================
        // HÀM PHÁT NHẠC - TỰ ĐỘNG KHI VÀO TRANG
        // ============================================================
        function playMemeSound() {
            try {
                if (audio) {
                    audio.pause();
                    audio.currentTime = 0;
                }

                audio = new Audio();

                // THỬ FILE CỤC BỘ
                audio.src = localSound;
                audio.volume = 0.8;

                let fallbackIndex = 0;

                audio.onerror = function() {
                    console.log('⚠️ Không tải được file cục bộ, thử link dự phòng...');
                    if (fallbackIndex < fallbackSounds.length) {
                        audio.src = fallbackSounds[fallbackIndex];
                        fallbackIndex++;
                        audio.load();
                        audio.play().catch(() => audio.onerror());
                    } else {
                        console.log('❌ Không thể phát âm thanh nào');
                    }
                };

                audio.play().catch(() => audio.onerror());

            } catch (e) {
                console.log('Lỗi phát nhạc:', e);
            }
        }

        // ============================================================
        // TẠO CHỮ BAY "BỊ LỪA RỒI!" + "ĐỒ NGU ĐỒ ĂN HẠI"
        // ============================================================
        function createFlyingText() {
            document.querySelectorAll('.flying-text, .overlay').forEach(el => el.remove());

            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            document.body.appendChild(overlay);

            const phrases = [
                "BỊ LỪA RỒI!", "HAHAHA!", "BỊ LỪA RỒI!", "ÔI TRỜI!",
                "LỪA ĐẢO!", "NGU NGƯỜI!", "BỊ LỪA RỒI!", "🤣🤣🤣",
                "ĐỒ NGU ĐỒ ĂN HẠI!", "ĐỒ NGU!", "ĂN HẠI!", "BỊ LỪA RỒI!"
            ];

            for (let i = 0; i < 30; i++) {
                const el = document.createElement('div');
                el.className = 'flying-text';
                el.textContent = phrases[Math.floor(Math.random() * phrases.length)];
                el.style.left = Math.random() * 85 + 5 + '%';
                el.style.top = Math.random() * 85 + 5 + '%';
                el.style.fontSize = (Math.random() * 3 + 2.5) + 'rem';
                el.style.animationDuration = (Math.random() * 3.5 + 3) + 's';
                el.style.animationDelay = (Math.random() * 1.8) + 's';
                el.style.transform = `rotate(${Math.random() * 60 - 30}deg)`;
                
                const colors = ['#ff2222', '#ff4444', '#ff6633', '#ff5555', '#ff3333', '#ff7744', '#ffaa00'];
                el.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                document.body.appendChild(el);
            }

            setTimeout(() => {
                document.querySelectorAll('.flying-text, .overlay').forEach(el => el.remove());
            }, 7000);
        }

        // ============================================================
        // KÍCH HOẠT TẤT CẢ KHI VỪA VÀO TRANG
        // ============================================================
        
        // 1. Phát nhạc ngay khi trang tải
        setTimeout(() => {
            playMemeSound();
        }, 300);

        // 2. Cho chữ bay sau 0.5s
        setTimeout(() => {
            createFlyingText();
        }, 500);

        // 3. Tự động lặp lại mỗi 8 giây
        setInterval(() => {
            playMemeSound();
            createFlyingText();
        }, 8000);

        // ============================================================
        // NÚT BẤM - ĐỂ DÙNG KHI MUỐN KÍCH HOẠT LẠI
        // ============================================================
        const btnLua = document.getElementById('btnLua');

        btnLua.addEventListener('click', function() {
            playMemeSound();
            createFlyingText();
            
            this.textContent = '🔊 ĐANG PHÁT...';
            this.disabled = true;
            
            setTimeout(() => {
                btnLua.textContent = '😈 BẤM LẠI NÀO';
                btnLua.disabled = false;
            }, 3000);
        });

        // ============================================================
        // HƯỚNG DẪN
        // ============================================================
        console.log('🐒 Trang lừa đảo với meme "đồ ngu đồ ăn hại" đã sẵn sàng!');
        console.log('📌 Mở trang là NHẠC TỰ ĐỘNG PHÁT + CHỮ BAY NGAY!');
        console.log('📌 CÁCH THÊM NHẠC CỦA BẠN:');
        console.log('1. Tải file "do-ngu-do-an-hai.mp3" về từ SoundInstants');
        console.log('2. Đặt file cùng thư mục với file HTML này');
        console.log('3. Mở lại trang web và tận hưởng!');
        console.log('🔊 Nhấn nút để phát lại khi muốn!');
    </script>

</body>
</html>
