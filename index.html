<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐒 Con vượn trêu đùa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== HIỆU ỨNG NỀN ===== */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .bg-particles span {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 200, 50, 0.15);
            animation: floatParticle linear infinite;
            pointer-events: none;
        }
        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* ===== CARD CHÍNH ===== */
        .container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            width: 100%;
            padding: 1.5rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 2.5rem;
            padding: 2rem 1.8rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== TIÊU ĐỀ ===== */
        .title {
            font-size: 2rem;
            font-weight: 800;
            color: #fbbf24;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .title .monkey-emoji {
            font-size: 2.5rem;
            animation: monkeyJump 1.5s ease-in-out infinite;
        }
        @keyframes monkeyJump {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-10px) rotate(-5deg);
            }
            75% {
                transform: translateY(-10px) rotate(5deg);
            }
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        /* ===== ẢNH CON VƯỢN ===== */
        .image-wrapper {
            position: relative;
            margin: 0 auto 1.5rem;
            border-radius: 2rem;
            overflow: hidden;
            border: 3px solid rgba(251, 191, 36, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
            max-width: 350px;
            aspect-ratio: 1/1;
        }
        .image-wrapper:hover {
            transform: scale(1.02);
            border-color: rgba(251, 191, 36, 0.5);
            box-shadow: 0 15px 50px rgba(251, 191, 36, 0.15);
        }
        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Khung viền sáng xung quanh ảnh */
        .image-wrapper::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 2rem;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #fbbf24);
            z-index: -1;
            animation: borderGlow 3s ease-in-out infinite;
            opacity: 0.5;
        }
        @keyframes borderGlow {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* ===== NÚT TRÊU ===== */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }

        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a1a2e;
            box-shadow: 0 4px 25px rgba(251, 191, 36, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 8px 40px rgba(251, 191, 36, 0.4);
        }
        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-3px);
        }

        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: rippleAnim 0.6s linear forwards;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* ===== PHẢN HỒI ===== */
        .response-area {
            margin-top: 1.5rem;
            padding: 0.8rem 1rem;
            border-radius: 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .response-area .text {
            color: #94a3b8;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        .response-area .text.success {
            color: #fbbf24;
            font-weight: 600;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            color: #475569;
            font-size: 0.7rem;
            margin-top: 1.2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 1rem;
            letter-spacing: 0.5px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 500px) {
            .glass-card {
                padding: 1.5rem 1rem 2rem;
            }
            .title {
                font-size: 1.5rem;
            }
            .image-wrapper {
                max-width: 280px;
            }
            .btn {
                padding: 0.6rem 1.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HẠT SÁNG NỀN ===== -->
    <div class="bg-particles" id="bgParticles"></div>

    <!-- ===== CARD CHÍNH ===== -->
    <div class="container">
        <div class="glass-card">

            <!-- Tiêu đề -->
            <div class="title">
                <span class="monkey-emoji">🐒</span>
                Vượn vui nhộn
                <span class="monkey-emoji" style="animation-delay:0.5s;">🙈</span>
            </div>
            <p class="subtitle">✨ Hôm nay vui vẻ lên nào! ✨</p>

            <!-- Ảnh con vượn - BẠN CÓ THỂ THAY BẰNG ẢNH CỦA MÌNH -->
            <div class="image-wrapper" id="imageWrapper">
                <img 
                    src="https://tse3.mm.bing.net/th/id/OIP.1XswuztcQnHn8lwz31z1MAHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3" 
                    alt="Con vượn dễ thương"
                    id="monkeyImage"
                />
            </div>

            <!-- Nút bấm -->
            <div class="btn-group">
                <button class="btn btn-primary" id="btnAction">🙊 Bấm vào đây</button>
                <button class="btn btn-secondary" id="btnDance">💃 Nhảy đi!</button>
            </div>

            <!-- Phản hồi -->
            <div class="response-area">
                <span class="text" id="responseText">🐵 Nhấn nút để trêu vượn nào!</span>
            </div>

            <div class="footer">
                🐒 Con vượn đang chờ bạn chơi cùng · 2026
            </div>

        </div>
    </div>

    <script>
        // =============================================
        // 1. TẠO HẠT SÁNG NỀN
        // =============================================
        (function createParticles() {
            const container = document.getElementById('bgParticles');
            for (let i = 0; i < 30; i++) {
                const span = document.createElement('span');
                const size = Math.random() * 8 + 3;
                span.style.width = size + 'px';
                span.style.height = size + 'px';
                span.style.left = Math.random() * 100 + '%';
                span.style.animationDuration = (Math.random() * 12 + 8) + 's';
                span.style.animationDelay = (Math.random() * 10) + 's';
                span.style.background = `rgba(251, 191, 36, ${Math.random() * 0.15 + 0.05})`;
                container.appendChild(span);
            }
        })();

        // =============================================
        // 2. NÚT "BẤM VÀO ĐÂY" - ĐỔI ẢNH + HIỆU ỨNG
        // =============================================
        const btnAction = document.getElementById('btnAction');
        const btnDance = document.getElementById('btnDance');
        const responseText = document.getElementById('responseText');
        const monkeyImage = document.getElementById('monkeyImage');
        const imageWrapper = document.getElementById('imageWrapper');

        // Các ảnh khác nhau để trêu
        const monkeyImages = [
            'https://tse3.mm.bing.net/th/id/OIP.1XswuztcQnHn8lwz31z1MAHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3',
            'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExd29tMnJvMmg4enMwZXYxN3BpcDd5cHprY3FvaXQ2dDNudTBuYzYzZyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/3o7aTskHEUdgCQAXde/giphy.gif',
            'https://media.giphy.com/media/9UqdV1fYp9jTbJcP2t/giphy.gif',
            'https://media.giphy.com/media/3o7aTskHEUdgCQAXde/giphy.gif'
        ];
        let currentImageIndex = 0;

        // Hiệu ứng Ripple
        function addRipple(e) {
            const btn = e.currentTarget;
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // Nút "Bấm vào đây"
        btnAction.addEventListener('click', function(e) {
            addRipple(e);

            // Đổi ảnh
            currentImageIndex = (currentImageIndex + 1) % monkeyImages.length;
            monkeyImage.src = monkeyImages[currentImageIndex];

            // Hiệu ứng shake cho ảnh
            imageWrapper.style.transition = 'transform 0.1s';
            imageWrapper.style.transform = 'rotate(-5deg) scale(1.02)';
            setTimeout(() => {
                imageWrapper.style.transform = 'rotate(5deg) scale(1.02)';
            }, 100);
            setTimeout(() => {
                imageWrapper.style.transform = 'rotate(0deg) scale(1)';
            }, 200);

            // Đổi text phản hồi
            const messages = [
                '🙈 Vượn ngại ngùng!',
                '🙊 Vượn bịt miệng!',
                '🐵 Vượn cười haha!',
                '🤪 Vượn điên rồi!',
                '😜 Vượn nháy mắt!',
                '🤣 Vượn lăn lộn!'
            ];
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            responseText.textContent = randomMsg;
            responseText.className = 'text success';
        });

        // =============================================
        // 3. NÚT "NHẢY ĐI!" - LÀM VƯỢN CHUYỂN ĐỘNG
        // =============================================
        btnDance.addEventListener('click', function(e) {
            addRipple(e);

            // Hiệu ứng nhảy cho ảnh
            imageWrapper.style.transition = 'transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            let count = 0;
            const danceInterval = setInterval(() => {
                const rotations = [-8, 8, -12, 12, -5, 5, 0];
                const scales = [1.02, 1.05, 0.98, 1.03, 1.06, 0.97, 1];
                imageWrapper.style.transform = 
                    `rotate(${rotations[count % rotations.length]}deg) scale(${scales[count % scales.length]})`;
                count++;
                if (count >= 12) {
                    clearInterval(danceInterval);
                    imageWrapper.style.transform = 'rotate(0deg) scale(1)';
                }
            }, 120);

            // Đổi text
            const danceMessages = [
                '💃 Vượn nhảy hiphop!',
                '🕺 Vượn nhảy breakdance!',
                '💃 Nhảy điên cuồng!',
                '🕺 Vượn cháy hết mình!',
                '🎵 Vượn rapper!'
            ];
            const randomDance = danceMessages[Math.floor(Math.random() * danceMessages.length)];
            responseText.textContent = randomDance;
            responseText.className = 'text success';

            // Đổi ảnh sang ảnh động (nếu có)
            setTimeout(() => {
                responseText.textContent = '🐵 Vượn mệt rồi, nghỉ tí!';
                setTimeout(() => {
                    responseText.textContent = '🐒 Bấm nữa đi, vượn vui lắm!';
                }, 1500);
            }, 2500);
        });

        // =============================================
        // 4. TRÊU VƯỢN BẰNG CÁCH DI CHUYỂN CHUỘT
        // =============================================
        document.addEventListener('mousemove', (e) => {
            // Tính vị trí tương đối của chuột
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            
            // Mắt vượn (không có thực nhưng vui)
            // Làm ảnh nghiêng nhẹ theo chuột
            imageWrapper.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            imageWrapper.style.transform = `perspective(800px) rotateY(${x * 2}deg) rotateX(${-y * 2}deg)`;
        });

        // Reset khi chuột rời khỏi ảnh
        imageWrapper.addEventListener('mouseleave', () => {
            imageWrapper.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            imageWrapper.style.transform = 'perspective(800px) rotateY(0deg) rotateX(0deg)';
        });

        // =============================================
        // 5. HIỆU ỨNG TỰ ĐỘNG KHI TẢI TRANG
        // =============================================
        setTimeout(() => {
            responseText.textContent = '🐵 Hế lô! Chơi với vượn đi!';
            responseText.className = 'text success';
            
            // Nhảy nhẹ khi vào
            imageWrapper.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            imageWrapper.style.transform = 'scale(1.02) rotate(-2deg)';
            setTimeout(() => {
                imageWrapper.style.transform = 'scale(1) rotate(0deg)';
            }, 400);
        }, 600);

        console.log('🐒 Trang trêu vượn đã sẵn sàng!');
    </script>

</body>
</html>
