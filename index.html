<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Câu đố · Bạn là gì của Admin?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0f1724 0%, #1f2a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 1.5rem;
            margin: 0;
        }

        .container {
            max-width: 780px;
            width: 100%;
            background: rgba(235, 225, 210, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 3.5rem 3.5rem 2.5rem 2.5rem;
            padding: 2.5rem 2rem 2.8rem;
            box-shadow: 0 30px 45px -12px rgba(0, 0, 0, 0.8), inset 0 1px 4px rgba(255, 245, 200, 0.5);
            border: 2px solid #dac9ae;
            transition: 0.2s;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #2c1f12;
            text-shadow: 0 3px 0 #b6986d;
            letter-spacing: -0.5px;
            margin-bottom: 0.25rem;
        }

        .subhead {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4d3822;
            background: #dac29e;
            display: inline-block;
            padding: 0.3rem 2rem;
            border-radius: 40px;
            margin-bottom: 2rem;
            border: 2px solid #b08858;
        }

        /* Quiz */
        .quiz-box {
            background: #eee3d1;
            border-radius: 60px 60px 40px 40px;
            padding: 2rem 1.5rem 1.8rem;
            box-shadow: inset 0 -6px 0 #af906e, 0 12px 18px rgba(0,0,0,0.2);
            border: 2px solid #c9b086;
        }

        .question {
            font-size: 1.7rem;
            font-weight: 700;
            color: #241b10;
            padding: 0.5rem 1rem;
            background: #fbf3e3;
            border-radius: 80px;
            display: inline-block;
            margin-bottom: 1.8rem;
            border: 2px solid #bb9b73;
            box-shadow: inset 0 -3px 0 #9b7d5a;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem 1.2rem;
            margin: 1.5rem 0 2rem;
        }

        .option-btn {
            background: #fcf3e2;
            border: 3px solid #b38b60;
            color: #2f2417;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 0.9rem 0.3rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.08s linear;
            box-shadow: 0 6px 0 #836b48, 0 4px 8px rgba(0,0,0,0.2);
            text-align: center;
            letter-spacing: 0.3px;
        }

        .option-btn:hover {
            transform: scale(0.97);
            background: #ffeace;
            border-color: #9f7a4e;
        }

        .option-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #6b5537;
        }

        .option-btn.correct {
            background: #6f9e6f;
            border-color: #2d6b2d;
            color: white;
            box-shadow: 0 4px 0 #1f4f1f;
        }

        .option-btn.wrong {
            background: #b15e5e;
            border-color: #7a3a3a;
            color: white;
            box-shadow: 0 4px 0 #582b2b;
        }

        .option-btn.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        /* kết quả */
        .result-area {
            margin: 1.8rem 0 0.8rem;
            padding: 1.2rem;
            border-radius: 80px;
            background: #dac09a;
            border: 3px solid #b58b5e;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .result-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1d150b;
            background: #f7e8d2;
            padding: 0.4rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 3px solid #9d7a50;
            box-shadow: inset 0 -3px 0 #7b5f3b;
        }

        .result-image {
            margin-top: 1.2rem;
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 40px;
            border: 6px solid #9e7b53;
            box-shadow: 0 10px 14px rgba(0,0,0,0.3);
            background: #f0e0c7;
            display: none; /* ẩn mặc định */
        }

        .result-image.show {
            display: block;
        }

        .reset-btn {
            margin-top: 1.8rem;
            background: #3b2e1d;
            border: none;
            color: #efe2cc;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 0.7rem 2.8rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #1a130b, 0 4px 12px black;
            transition: 0.06s linear;
            border: 2px solid #bea076;
            letter-spacing: 1px;
        }

        .reset-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #1a130b;
        }

        .reset-btn:hover {
            background: #52412a;
        }

        .footnote {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #4b3924;
            background: #dac29e;
            padding: 0.3rem 1.5rem;
            border-radius: 40px;
            display: inline-block;
        }

        @media (max-width: 550px) {
            .container { padding: 1.5rem 1rem; }
            h1 { font-size: 2.2rem; }
            .options { grid-template-columns: 1fr; gap: 0.7rem; }
            .question { font-size: 1.4rem; }
            .result-text { font-size: 1.7rem; }
            .result-image { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 ĐỐ VUI</h1>
        <div class="subhead">⚡ 5 câu hỏi hại não ⚡</div>

        <div class="quiz-box" id="quizBox">
            <div class="question" id="questionDisplay">Câu hỏi sẽ hiện tại đây</div>
            <div class="options" id="optionsContainer"></div>

            <div class="result-area" id="resultArea">
                <div class="result-text" id="resultText">🤔 Chọn đáp án...</div>
                <img id="resultImage" class="result-image" src="" alt="Ảnh bí ẩn">
            </div>

            <button class="reset-btn" id="resetBtn">🔄 CHƠI LẠI</button>
        </div>
        <div class="footnote">💡 Trả lời đúng cả 5 câu để biết "bạn là gì của admin"</div>
    </div>
    <script>
        (function() {
            // ----- 5 câu đố khó (vui) -----
            const questions = [
                {
                    question: "Cái gì càng đốt càng dài?",
                    options: ["Nến", "Tóc", "Que diêm", "Ruột bánh mì"],
                    correct: 0 // Nến
                },
                {
                    question: "Con gì đầu dê, mình ốc?",
                    options: ["Dê ốc", "Ốc sên", "Dốc (dốc núi)", "Khỉ dê"],
                    correct: 2 // Dốc (chữ chơi)
                },
                {
                    question: "Bệnh gì bác sĩ phải bó tay?",
                    options: ["Gãy tay", "Bó tay (bó bột)", "Bệnh vô danh", "Bệnh sĩ"],
                    correct: 1 // bó tay
                },
                {
                    question: "Lịch nào dài nhất?",
                    options: ["Lịch sử", "Lịch âm", "Lịch Tây", "Lịch thi đấu"],
                    correct: 0 // Lịch sử
                },
                {
                    question: "Con gì có cánh mà không bay?",
                    options: ["Chim cánh cụt", "Gà", "Vịt", "Công"],
                    correct: 0 // Chim cánh cụt
                }
            ];

            // Ảnh từ link (sẽ thay bằng ảnh của bạn)
            const IMAGE_URL = "https://tse3.mm.bing.net/th/id/OIP.1XswuztcQnHn8lwz31z1MAHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3";

            // Các kết quả tương ứng (theo thứ tự: bạn bè, không biết, bố của admin)
            const RESULT_MESSAGES = [
                "👥 Bạn bè",
                "❓ Không biết",
                "👨‍👦 Bố của admin"
            ];

            // Trạng thái
            let currentQuestionIndex = 0;
            let correctCount = 0;
            let isQuizFinished = false;
            let optionButtons = [];

            // DOM elements
            const questionDisplay = document.getElementById('questionDisplay');
            const optionsContainer = document.getElementById('optionsContainer');
            const resultText = document.getElementById('resultText');
            const resultImage = document.getElementById('resultImage');
            const resetBtn = document.getElementById('resetBtn');

            // Hàm hiển thị câu hỏi
            function renderQuestion(index) {
                if (index >= questions.length) {
                    finishQuiz();
                    return;
                }

                const q = questions[index];
                questionDisplay.textContent = `Câu ${index + 1}: ${q.question}`;
                optionsContainer.innerHTML = '';
                optionButtons = [];

                q.options.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.dataset.index = i;
                    btn.addEventListener('click', () => handleOptionClick(i, index));
                    optionsContainer.appendChild(btn);
                    optionButtons.push(btn);
                });

                // reset trạng thái result tạm thời
                resultText.textContent = `🤔 Đang suy nghĩ...`;
                resultImage.classList.remove('show');
                resultImage.src = '';
                isQuizFinished = false;
            }

            // Xử lý chọn đáp án
            function handleOptionClick(selectedIndex, questionIndex) {
                if (isQuizFinished) return;
                const q = questions[questionIndex];
                const isCorrect = (selectedIndex === q.correct);
                const buttons = optionButtons;

                // Disable tất cả nút
                buttons.forEach(btn => {
                    btn.classList.add('disabled');
                    btn.style.pointerEvents = 'none';
                });

                // Tô màu đúng/sai
                buttons.forEach((btn, idx) => {
                    if (idx === q.correct) {
                        btn.classList.add('correct');
                    } else if (idx === selectedIndex && !isCorrect) {
                        btn.classList.add('wrong');
                    }
                });

                // Cập nhật số câu đúng
                if (isCorrect) {
                    correctCount++;
                }

                // Sau 0.6s chuyển câu tiếp theo hoặc kết thúc
                setTimeout(() => {
                    // di chuyển đến câu tiếp theo
                    currentQuestionIndex++;
                    if (currentQuestionIndex < questions.length) {
                        renderQuestion(currentQuestionIndex);
                    } else {
                        finishQuiz();
                    }
                }, 700);
            }

            // Kết thúc quiz: hiện kết quả và ảnh
            function finishQuiz() {
                isQuizFinished = true;
                questionDisplay.textContent = "🎉 HOÀN THÀNH!";

                // Xóa các nút (ẩn đi)
                optionsContainer.innerHTML = '';

                // Xác định kết quả (dựa trên số câu đúng)
                let resultMessage = '';
                let imageToShow = IMAGE_URL;

                if (correctCount === 5) {
                    resultMessage = RESULT_MESSAGES[2]; // "Bố của admin"
                } else if (correctCount >= 3 && correctCount <= 4) {
                    resultMessage = RESULT_MESSAGES[0]; // "Bạn bè"
                } else {
                    resultMessage = RESULT_MESSAGES[1]; // "Không biết"
                }

                // Hiển thị kết quả
                resultText.textContent = `✅ Bạn là: ${resultMessage}`;
                resultImage.src = imageToShow;
                resultImage.alt = "Ảnh bí ẩn";
                resultImage.classList.add('show');

                // (Tùy chỉnh thêm nếu muốn)
            }

            // Reset toàn bộ
            function resetQuiz() {
                currentQuestionIndex = 0;
                correctCount = 0;
                isQuizFinished = false;
                resultImage.classList.remove('show');
                resultImage.src = '';
                resultText.textContent = '🤔 Chọn đáp án...';
                renderQuestion(0);
            }

            // Gán sự kiện reset
            resetBtn.addEventListener('click', resetQuiz);

            // Khởi tạo
            resetQuiz();
        })();
    </script>
</body>
</html>
