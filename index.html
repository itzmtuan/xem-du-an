<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Thử thách ức chế · Bị lừa rồi!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0f1724 0%, #1f2a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 1.5rem;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            max-width: 780px;
            width: 100%;
            background: rgba(235, 225, 210, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 3.5rem 3.5rem 2.5rem 2.5rem;
            padding: 2.5rem 2rem 2.8rem;
            box-shadow: 0 30px 45px -12px rgba(0, 0, 0, 0.8);
            border: 2px solid #dac9ae;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #2c1f12;
            text-shadow: 0 3px 0 #b6986d;
            margin-bottom: 0.25rem;
        }
        .subhead {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4d3822;
            background: #dac29e;
            display: inline-block;
            padding: 0.3rem 2rem;
            border-radius: 40px;
            margin-bottom: 2rem;
            border: 2px solid #b08858;
        }

        .quiz-box {
            background: #eee3d1;
            border-radius: 60px 60px 40px 40px;
            padding: 2rem 1.5rem 1.8rem;
            box-shadow: inset 0 -6px 0 #af906e, 0 12px 18px rgba(0,0,0,0.2);
            border: 2px solid #c9b086;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .question {
            font-size: 1.7rem;
            font-weight: 700;
            color: #241b10;
            padding: 0.5rem 1rem;
            background: #fbf3e3;
            border-radius: 80px;
            display: inline-block;
            margin-bottom: 1.2rem;
            border: 2px solid #bb9b73;
            box-shadow: inset 0 -3px 0 #9b7d5a;
            width: 100%;
        }

        .action-area {
            width: 100%;
            min-height: 240px;
            background: #dccdb6;
            border-radius: 40px;
            padding: 1.5rem;
            margin-bottom: 1.2rem;
            border: 4px dashed #9b7d5a;
            position: relative;
            overflow: hidden;
            cursor: default;
            touch-action: none;
        }

        .drag-object {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #ff8844, #cc4400);
            border-radius: 50%;
            position: absolute;
            cursor: grab;
            box-shadow: 0 8px 0 #7a3300, 0 8px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 0 #4d1f00;
            transition: box-shadow 0.1s;
            touch-action: none;
            z-index: 5;
        }
        .drag-object:active {
            cursor: grabbing;
            box-shadow: 0 4px 0 #7a3300;
            transform: translateY(4px);
        }

        .target-zone {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 5px solid #2d7a2d;
            border-radius: 30px;
            background: rgba(45, 122, 45, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #1f5a1f;
            font-size: 1.1rem;
            text-align: center;
            pointer-events: none;
            box-shadow: inset 0 0 20px rgba(45, 122, 45, 0.2);
        }
        .target-zone.success {
            background: rgba(45, 122, 45, 0.4);
            border-color: #00cc00;
            box-shadow: 0 0 30px #00cc00;
        }

        .wall {
            position: absolute;
            background: #6b4f3a;
            border-radius: 10px;
            border: 3px solid #4d3524;
            box-shadow: inset 0 0 10px #3d2a1c;
            pointer-events: none;
        }

        .action-btn {
            background: #3b6f3b;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 0.6rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #1f4a1f;
            transition: 0.05s linear;
            margin: 0.3rem;
            pointer-events: auto;
        }
        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #1f4a1f;
        }
        .action-btn:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1f4a1f;
            pointer-events: none;
        }

        .result-area {
            margin: 0.5rem 0 0.5rem;
            padding: 0.8rem;
            border-radius: 80px;
            background: #dac09a;
            border: 3px solid #b58b5e;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .result-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1d150b;
            background: #f7e8d2;
            padding: 0.3rem 2rem;
            border-radius: 60px;
            display: inline-block;
            border: 3px solid #9d7a50;
        }

        .reset-btn {
            margin-top: 1.2rem;
            background: #3b2e1d;
            border: none;
            color: #efe2cc;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 0.7rem 2.8rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #1a130b;
            transition: 0.06s linear;
            border: 2px solid #bea076;
        }
        .reset-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #1a130b;
        }

        .footnote {
            margin-top: 1.2rem;
            font-size: 0.9rem;
            color: #4b3924;
            background: #dac29e;
            padding: 0.3rem 1.5rem;
            border-radius: 40px;
            display: inline-block;
        }

        /* Hiệu ứng bay */
        .flying-text {
            position: fixed;
            font-size: 3.5rem;
            font-weight: 900;
            color: #e03a1f;
            text-shadow: 0 0 15px #ff6a4a, 0 0 30px #ff2200, 3px 3px 0 #4d1a0e;
            pointer-events: none;
            z-index: 9999;
            animation: flyAround 4.5s linear forwards;
            white-space: nowrap;
            letter-spacing: 2px;
        }

        .flying-image {
            position: fixed;
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 30px;
            border: 5px solid #ffcc77;
            box-shadow: 0 0 35px rgba(255, 100, 0, 0.9);
            pointer-events: none;
            z-index: 9998;
            animation: flyAround 5s linear forwards;
        }

        .overlay-win {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9997;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        @keyframes flyAround {
            0% { opacity: 0; transform: translate(0, 0) scale(0.2) rotate(0deg); }
            10% { opacity: 1; transform: translate(40px, -80px) scale(1.2) rotate(10deg); }
            25% { transform: translate(-150px, 50px) scale(1) rotate(-15deg); }
            50% { transform: translate(200px, -120px) scale(1.3) rotate(18deg); }
            75% { transform: translate(-250px, 100px) scale(0.9) rotate(-25deg); }
            100% { opacity: 0; transform: translate(300px, -180px) scale(1.4) rotate(30deg); }
        }

        /* Thông báo "tốn 5 phút" */
        .wasted-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: #ffdd44;
            font-size: 2.8rem;
            font-weight: 900;
            padding: 1.5rem 3rem;
            border-radius: 80px;
            border: 4px solid #ffcc00;
            box-shadow: 0 0 60px rgba(255, 200, 0, 0.5);
            z-index: 10000;
            text-align: center;
            animation: pulseGlow 1.5s ease-in-out infinite alternate;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 2px;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 30px rgba(255, 200, 0, 0.3); transform: translate(-50%, -50%) scale(1); }
            100% { box-shadow: 0 0 80px rgba(255, 200, 0, 0.8); transform: translate(-50%, -50%) scale(1.05); }
        }

        @media (max-width: 600px) {
            .container { padding: 1.5rem 1rem; }
            h1 { font-size: 2.2rem; }
            .question { font-size: 1.2rem; }
            .drag-object { width: 50px; height: 50px; font-size: 1.5rem; }
            .target-zone { width: 70px; height: 70px; font-size: 0.8rem; }
            .flying-text { font-size: 2.2rem; }
            .flying-image { width: 70px; height: 70px; }
            .wasted-message { font-size: 1.8rem; padding: 1rem 1.5rem; white-space: normal; }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <h1>😈 THỬ THÁCH ỨC CHẾ</h1>
        <div class="subhead">⚡ 5 cấp độ điên đầu ⚡</div>

        <div class="quiz-box" id="quizBox">
            <div class="question" id="questionDisplay">Sẵn sàng?</div>
            <div class="action-area" id="actionArea"></div>
            <div class="result-area" id="resultArea">
                <div class="result-text" id="resultText">🤔 Làm theo hướng dẫn...</div>
            </div>
            <button class="reset-btn" id="resetBtn">🔄 CHƠI LẠI</button>
        </div>
        <div class="footnote">💡 Hoàn thành 5 thử thách để nhận "phần thưởng"</div>
    </div>

    <script>
        (function() {
            const IMAGE_URL = "https://tse3.mm.bing.net/th/id/OIP.1XswuztcQnHn8lwz31z1MAHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3";

            // ========== 5 THỬ THÁCH ỨC CHẾ ==========
            const challenges = [
                // 1. Kéo vật, nhưng đích di chuyển
                {
                    title: "Đích di động",
                    description: "Kéo vật vào đích… nhưng nó chạy mất!",
                    render: function(container, onComplete) {
                        container.innerHTML = '';
                        let targetX = 70, targetY = 70;
                        let moveInterval;

                        const drag = document.createElement('div');
                        drag.className = 'drag-object';
                        drag.textContent = '😤';
                        drag.style.left = '20px';
                        drag.style.top = '20px';
                        drag.style.width = '55px';
                        drag.style.height = '55px';
                        container.appendChild(drag);

                        const target = document.createElement('div');
                        target.className = 'target-zone';
                        target.textContent = '🎯 CHẠY';
                        target.style.left = targetX + '%';
                        target.style.top = targetY + '%';
                        target.style.width = '90px';
                        target.style.height = '90px';
                        container.appendChild(target);

                        // Đích di chuyển ngẫu nhiên
                        moveInterval = setInterval(() => {
                            if (document.querySelector('.target-zone.success')) return;
                            targetX = Math.random() * 65 + 10;
                            targetY = Math.random() * 65 + 10;
                            target.style.left = targetX + '%';
                            target.style.top = targetY + '%';
                        }, 600);

                        let isDragging = false, offsetX, offsetY;

                        const onStart = (e) => {
                            e.preventDefault();
                            isDragging = true;
                            const rect = drag.getBoundingClientRect();
                            const containerRect = container.getBoundingClientRect();
                            offsetX = (e.clientX || e.touches[0].clientX) - rect.left;
                            offsetY = (e.clientY || e.touches[0].clientY) - rect.top;
                        };

                        const onMove = (e) => {
                            if (!isDragging) return;
                            e.preventDefault();
                            const clientX = e.clientX || e.touches[0].clientX;
                            const clientY = e.clientY || e.touches[0].clientY;
                            const containerRect = container.getBoundingClientRect();
                            let left = clientX - containerRect.left - offsetX;
                            let top = clientY - containerRect.top - offsetY;
                            left = Math.max(0, Math.min(left, containerRect.width - drag.offsetWidth));
                            top = Math.max(0, Math.min(top, containerRect.height - drag.offsetHeight));
                            drag.style.left = left + 'px';
                            drag.style.top = top + 'px';

                            const dragRect = drag.getBoundingClientRect();
                            const targetRect = target.getBoundingClientRect();
                            if (dragRect.left < targetRect.right - 5 &&
                                dragRect.right > targetRect.left + 5 &&
                                dragRect.top < targetRect.bottom - 5 &&
                                dragRect.bottom > targetRect.top + 5) {
                                clearInterval(moveInterval);
                                target.classList.add('success');
                                target.textContent = '✅ BẮT ĐƯỢC!';
                                drag.style.display = 'none';
                                isDragging = false;
                                onComplete();
                            }
                        };

                        const onEnd = () => { isDragging = false; };

                        drag.addEventListener('mousedown', onStart);
                        drag.addEventListener('touchstart', onStart, { passive: false });
                        document.addEventListener('mousemove', onMove);
                        document.addEventListener('touchmove', onMove, { passive: false });
                        document.addEventListener('mouseup', onEnd);
                        document.addEventListener('touchend', onEnd);

                        container._cleanup = () => {
                            clearInterval(moveInterval);
                            document.removeEventListener('mousemove', onMove);
                            document.removeEventListener('touchmove', onMove);
                            document.removeEventListener('mouseup', onEnd);
                            document.removeEventListener('touchend', onEnd);
                        };
                    }
                },
                // 2. Nhấn nút đúng thứ tự (1, 2, 3, 4, 5)
                {
                    title: "Nhấn theo thứ tự",
                    description: "Nhấn các nút theo thứ tự từ 1 → 5 (nút sẽ đảo vị trí)",
                    render: function(container, onComplete) {
                        container.innerHTML = '';
                        let nextNumber = 1;
                        const total = 5;
                        const buttons = [];

                        // Tạo 5 nút với số ngẫu nhiên
                        const numbers = [1, 2, 3, 4, 5];
                        for (let i = 0; i < total; i++) {
                            const btn = document.createElement('button');
                            btn.className = 'action-btn';
                            btn.textContent = numbers[i];
                            btn.style.position = 'absolute';
                            btn.style.left = (10 + Math.random() * 70) + '%';
                            btn.style.top = (10 + Math.random() * 70) + '%';
                            btn.style.fontSize = '1.5rem';
                            btn.style.padding = '0.5rem 1.2rem';
                            btn.style.background = '#6b4f3a';
                            btn.style.boxShadow = '0 6px 0 #3d2a1c';
                            btn.dataset.value = numbers[i];
                            container.appendChild(btn);
                            buttons.push(btn);
                        }

                        // Hàm xáo trộn vị trí
                        function shuffleButtons() {
                            buttons.forEach(b => {
                                b.style.left = (10 + Math.random() * 70) + '%';
                                b.style.top = (10 + Math.random() * 70) + '%';
                            });
                        }

                        // Xáo mỗi 2 giây
                        const shuffleInterval = setInterval(() => {
                            if (nextNumber > total) return;
                            shuffleButtons();
                        }, 1800);

                        const clickHandler = (e) => {
                            const btn = e.currentTarget;
                            const val = parseInt(btn.dataset.value);
                            if (val === nextNumber) {
                                btn.style.background = '#2d8f2d';
                                btn.style.boxShadow = '0 6px 0 #1a5a1a';
                                btn.style.pointerEvents = 'none';
                                btn.textContent = '✅';
                                nextNumber++;
                                if (nextNumber > total) {
                                    clearInterval(shuffleInterval);
                                    setTimeout(() => {
                                        onComplete();
                                    }, 300);
                                }
                            } else {
                                // Sai -> đau
                                btn.style.background = '#cc3333';
                                btn.style.boxShadow = '0 6px 0 #771111';
                                setTimeout(() => {
                                    btn.style.background = '#6b4f3a';
                                    btn.style.boxShadow = '0 6px 0 #3d2a1c';
                                }, 300);
                            }
                        };

                        buttons.forEach(b => b.addEventListener('click', clickHandler));

                        container._cleanup = () => {
                            clearInterval(shuffleInterval);
                            buttons.forEach(b => b.removeEventListener('click', clickHandler));
                        };
                    }
                },
                // 3. Bấm đúng số lần nhưng đếm ngược
                {
                    title: "Đếm ngược",
                    description: "Bấm vào vật thể đúng 5 lần, nhưng số đếm ngược",
                    render: function(container, onComplete) {
                        container.innerHTML = '';
                        let count = 5;
                        const targetCount = 5;

                        const obj = document.createElement('div');
                        obj.className = 'drag-object';
                        obj.textContent = '🔴';
                        obj.style.left = '50%';
                        obj.style.top = '50%';
                        obj.style.transform = 'translate(-50%, -50%)';
                        obj.style.width = '90px';
                        obj.style.height = '90px';
                        obj.style.fontSize = '3.5rem';
                        obj.style.cursor = 'pointer';
                        obj.style.background = 'radial-gradient(circle at 30% 30%, #ff4444, #aa2222)';
                        obj.style.boxShadow = '0 8px 0 #661111';
                        container.appendChild(obj);

                        const counter = document.createElement('div');
                        counter.style.position = 'absolute';
                        counter.style.top = '10px';
                        counter.style.left = '50%';
                        counter.style.transform = 'translateX(-50%)';
                        counter.style.fontSize = '2rem';
                        counter.style.fontWeight = 'bold';
                        counter.style.background = 'rgba(0,0,0,0.7)';
                        counter.style.color = '#ffaa44';
                        counter.style.padding = '0.2rem 1.5rem';
                        counter.style.borderRadius = '40px';
                        counter.textContent = `${count}`;
                        container.appendChild(counter);

                        let clickCount = 0;
                        const clickHandler = () => {
                            clickCount++;
                            count--;
                            counter.textContent = count > 0 ? count : '🔥';
                            obj.style.transform = `translate(-50%, -50%) scale(${1 + clickCount * 0.15})`;

                            if (clickCount === 1) {
                                // Lần 1: đổi màu
                                obj.style.background = 'radial-gradient(circle at 30% 30%, #ff8844, #cc5500)';
                            } else if (clickCount === 2) {
                                obj.textContent = '😈';
                            } else if (clickCount === 3) {
                                obj.style.background = 'radial-gradient(circle at 30% 30%, #44aaff, #0066cc)';
                            } else if (clickCount === 4) {
                                obj.textContent = '💢';
                            }

                            if (clickCount >= targetCount) {
                                obj.style.background = 'radial-gradient(circle at 30% 30%, #44ff88, #00aa44)';
                                obj.textContent = '✅';
                                counter.textContent = '✅ HOÀN THÀNH!';
                                obj.removeEventListener('click', clickHandler);
                                onComplete();
                            }
                        };

                        obj.addEventListener('click', clickHandler);
                        container._cleanup = () => {
                            obj.removeEventListener('click', clickHandler);
                        };
                    }
                },
                // 4. Kéo tránh vật thể di chuyển
                {
                    title: "Chạy trốn",
                    description: "Kéo vật vào đích, tránh các chướng ngại di chuyển",
                    render: function(container, onComplete) {
                        container.innerHTML = '';
                        const obstacles = [];
                        const obstacleCount = 6;

                        // Tạo chướng ngại di chuyển
                        for (let i = 0; i < obstacleCount; i++) {
                            const obs = document.createElement('div');
                            obs.className = 'wall';
                            obs.style.width = (30 + Math.random() * 25) + 'px';
                            obs.style.height = (30 + Math.random() * 25) + 'px';
                            obs.style.left = (Math.random() * 70 + 10) + '%';
                            obs.style.top = (Math.random() * 70 + 10) + '%';
                            obs.style.background = '#8a2a2a';
                            obs.style.borderColor = '#551111';
                            obs.style.borderRadius = '50%';
                            obs.dataset.dx = (Math.random() - 0.5) * 2;
                            obs.dataset.dy = (Math.random() - 0.5) * 2;
                            container.appendChild(obs);
                            obstacles.push(obs);
                        }

                        // Vật kéo
                        const drag = document.createElement('div');
                        drag.className = 'drag-object';
                        drag.textContent = '🏃';
                        drag.style.left = '20px';
                        drag.style.top = '60px';
                        drag.style.width = '50px';
                        drag.style.height = '50px';
                        drag.style.fontSize = '2rem';
                        drag.style.background = 'radial-gradient(circle at 30% 30%, #44ddff, #0088cc)';
                        drag.style.boxShadow = '0 8px 0 #005588';
                        container.appendChild(drag);

                        // Đích
                        const target = document.createElement('div');
                        target.className = 'target-zone';
                        target.textContent = '🏁 ĐÍCH';
                        target.style.right = '20px';
                        target.style.bottom = '20px';
                        target.style.width = '100px';
                        target.style.height = '100px';
                        container.appendChild(target);

                        let isDragging = false, offsetX, offsetY;
                        let animFrame;

                        // Di chuyển chướng ngại
                        function moveObstacles() {
                            obstacles.forEach(obs => {
                                let left = parseFloat(obs.style.left);
                                let top = parseFloat(obs.style.top);
                                let dx = parseFloat(obs.dataset.dx);
                                let dy = parseFloat(obs.dataset.dy);

                                left += dx * 0.8;
                                top += dy * 0.8;

                                if (left < 5 || left > 85) { obs.dataset.dx = -dx; }
                                if (top < 5 || top > 85) { obs.dataset.dy = -dy; }

                                obs.style.left = left + '%';
                                obs.style.top = top + '%';
                            });
                            animFrame = requestAnimationFrame(moveObstacles);
                        }
                        moveObstacles();

                        const onStart = (e) => {
                            e.preventDefault();
                            isDragging = true;
                            const rect = drag.getBoundingClientRect();
                            const containerRect = container.getBoundingClientRect();
                            offsetX = (e.clientX || e.touches[0].clientX) - rect.left;
                            offsetY = (e.clientY || e.touches[0].clientY) - rect.top;
                        };

                        const onMove = (e) => {
                            if (!isDragging) return;
                            e.preventDefault();
                            const clientX = e.clientX || e.touches[0].clientX;
                            const clientY = e.clientY || e.touches[0].clientY;
                            const containerRect = container.getBoundingClientRect();
                            let left = clientX - containerRect.left - offsetX;
                            let top = clientY - containerRect.top - offsetY;
                            left = Math.max(0, Math.min(left, containerRect.width - drag.offsetWidth));
                            top = Math.max(0, Math.min(top, containerRect.height - drag.offsetHeight));
                            drag.style.left = left + 'px';
                            drag.style.top = top + 'px';

                            // Kiểm tra va chạm chướng ngại
                            const dragRect = drag.getBoundingClientRect();
                            let hit = false;
                            obstacles.forEach(obs => {
                                const obsRect = obs.getBoundingClientRect();
                                if (dragRect.left < obsRect.right - 2 &&
                                    dragRect.right > obsRect.left + 2 &&
                                    dragRect.top < obsRect.bottom - 2 &&
                                    dragRect.bottom > obsRect.top + 2) {
                                    hit = true;
                                }
                            });

                            if (hit) {
                                drag.style.background = 'radial-gradient(circle at 30% 30%, #ff4444, #aa0000)';
                                setTimeout(() => {
                                    drag.style.background = 'radial-gradient(circle at 30% 30%, #44ddff, #0088cc)';
                                }, 200);
                                return;
                            }

                            // Kiểm tra đến đích
                            const targetRect = target.getBoundingClientRect();
                            if (dragRect.left < targetRect.right - 5 &&
                                dragRect.right > targetRect.left + 5 &&
                                dragRect.top < targetRect.bottom - 5 &&
                                dragRect.bottom > targetRect.top + 5) {
                                target.classList.add('success');
                                target.textContent = '✅ ĐẾN!';
                                drag.style.display = 'none';
                                isDragging = false;
                                cancelAnimationFrame(animFrame);
                                onComplete();
                            }
                        };

                        const onEnd = () => { isDragging = false; };

                        drag.addEventListener('mousedown', onStart);
                        drag.addEventListener('touchstart', onStart, { passive: false });
                        document.addEventListener('mousemove', onMove);
                        document.addEventListener('touchmove', onMove, { passive: false });
                        document.addEventListener('mouseup', onEnd);
                        document.addEventListener('touchend', onEnd);

                        container._cleanup = () => {
                            cancelAnimationFrame(animFrame);
                            document.removeEventListener('mousemove', onMove);
                            document.removeEventListener('touchmove', onMove);
                            document.removeEventListener('mouseup', onEnd);
                            document.removeEventListener('touchend', onEnd);
                        };
                    }
                },
                // 5. Bấm nút 100 lần (ức chế nhất)
                {
                    title: "Bấm 100 lần",
                    description: "Bấm vào nút 100 lần. Đếm ngược từ 100",
                    render: function(container, onComplete) {
                        container.innerHTML = '';
                        let count = 100;

                        const btn = document.createElement('button');
                        btn.className = 'action-btn';
                        btn.textContent = '👆 BẤM TÔI';
                        btn.style.position = 'absolute';
                        btn.style.left = '50%';
                        btn.style.top = '50%';
                        btn.style.transform = 'translate(-50%, -50%)';
                        btn.style.fontSize = '2rem';
                        btn.style.padding = '1rem 2.5rem';
                        btn.style.background = '#cc4444';
                        btn.style.boxShadow = '0 8px 0 #771111';
                        btn.style.width = '200px';
                        btn.style.height = '80px';
                        container.appendChild(btn);

                        const counter = document.createElement('div');
                        counter.style.position = 'absolute';
                        counter.style.top = '10px';
                        counter.style.right = '20px';
                        counter.style.fontSize = '2rem';
                        counter.style.fontWeight = 'bold';
                        counter.style.background = 'rgba(0,0,0,0.7)';
                        counter.style.color = '#ffaa44';
                        counter.style.padding = '0.2rem 1.5rem';
                        counter.style.borderRadius = '40px';
                        counter.textContent = `${count}`;
                        container.appendChild(counter);

                        // Thanh tiến trình
                        const progress = document.createElement('div');
                        progress.style.position = 'absolute';
                        progress.style.bottom = '10px';
                        progress.style.left = '10%';
                        progress.style.width = '80%';
                        progress.style.height = '12px';
                        progress.style.background = '#333';
                        progress.style.borderRadius = '20px';
                        progress.style.overflow = 'hidden';
                        const fill = document.createElement('div');
                        fill.style.height = '100%';
                        fill.style.width = '0%';
                        fill.style.background = 'linear-gradient(90deg, #ff4444, #ffaa00, #44ff44)';
                        fill.style.transition = 'width 0.05s';
                        progress.appendChild(fill);
                        container.appendChild(progress);

                        const clickHandler = () => {
                            count--;
                            counter.textContent = count > 0 ? count : '🔥';
                            const progressPercent = ((100 - count) / 100) * 100;
                            fill.style.width = progressPercent + '%';

                            // Đổi màu nút theo tiến trình
                            if (count > 70) btn.style.background = '#cc4444';
                            else if (count > 40) btn.style.background = '#cc8844';
                            else if (count > 10) btn.style.background = '#44aa44';
                            else btn.style.background = '#44dd44';

                            btn.textContent = count > 0 ? `👆 CÒN ${count}` : '🎉';

                            if (count <= 0) {
                                btn.textContent = '✅ HOÀN THÀNH!';
                                btn.style.background = '#44dd44';
                                btn.style.boxShadow = '0 8px 0 #228822';
                                btn.removeEventListener('click', clickHandler);
                                setTimeout(onComplete, 400);
                            }
                        };

                        btn.addEventListener('click', clickHandler);
                        container._cleanup = () => {
                            btn.removeEventListener('click', clickHandler);
                        };
                    }
                }
            ];

            // ====== QUẢN LÝ ======
            let currentChallengeIndex = 0;
            let completedCount = 0;
            let isGameFinished = false;
            const actionArea = document.getElementById('actionArea');
            const questionDisplay = document.getElementById('questionDisplay');
            const resultText = document.getElementById('resultText');
            const resetBtn = document.getElementById('resetBtn');

            let currentCleanup = null;

            function loadChallenge(index) {
                if (currentCleanup) {
                    currentCleanup();
                    currentCleanup = null;
                }

                if (index >= challenges.length) {
                    finishGame();
                    return;
                }

                const challenge = challenges[index];
                questionDisplay.textContent = `Thử thách ${index+1}/5: ${challenge.title}`;
                resultText.textContent = challenge.description;
                isGameFinished = false;

                challenge.render(actionArea, () => {
                    completedCount++;
                    resultText.textContent = `✅ Hoàn thành! (${completedCount}/${challenges.length})`;
                    setTimeout(() => {
                        currentChallengeIndex++;
                        loadChallenge(currentChallengeIndex);
                    }, 700);
                });

                currentCleanup = actionArea._cleanup || null;
            }

            function finishGame() {
                isGameFinished = true;
                questionDisplay.textContent = '🎉 HOÀN THÀNH TẤT CẢ!';
                actionArea.innerHTML = '';
                if (currentCleanup) {
                    currentCleanup();
                    currentCleanup = null;
                }

                if (completedCount === challenges.length) {
                    resultText.textContent = '🤯 BỊ LỪA RỒI!';
                    setTimeout(() => {
                        createFlyingElements();
                        // Thêm thông báo "tốn 5 phút" sau 1.5s
                        setTimeout(() => {
                            showWastedMessage();
                        }, 1500);
                    }, 300);
                } else {
                    resultText.textContent = `😅 Chỉ ${completedCount}/5. Thử lại nhé!`;
                }
            }

            // ====== HIỆU ỨNG ======
            function createFlyingElements() {
                document.querySelectorAll('.flying-text, .flying-image, .overlay-win, .wasted-message').forEach(el => el.remove());

                const overlay = document.createElement('div');
                overlay.className = 'overlay-win';
                document.body.appendChild(overlay);

                const phrases = ["BỊ LỪA RỒI!", "HAHAHA!", "BỊ LỪA RỒI!", "ÔI TRỜI!", "LỪA ĐẢO!", "NGU NGƯỜI!"];
                for (let i = 0; i < 25; i++) {
                    const el = document.createElement('div');
                    el.className = 'flying-text';
                    el.textContent = phrases[Math.floor(Math.random() * phrases.length)];
                    el.style.left = Math.random() * 85 + 5 + '%';
                    el.style.top = Math.random() * 85 + 5 + '%';
                    el.style.fontSize = (Math.random() * 3 + 2) + 'rem';
                    el.style.animationDuration = (Math.random() * 3.5 + 2.5) + 's';
                    el.style.animationDelay = (Math.random() * 1.5) + 's';
                    el.style.transform = `rotate(${Math.random() * 60 - 30}deg)`;
                    el.style.color = ['#ff3d1a', '#ff6a2a', '#ff2200', '#ff8844', '#ff5555', '#ffaa00'][Math.floor(Math.random() * 6)];
                    document.body.appendChild(el);
                }

                for (let i = 0; i < 15; i++) {
                    const img = document.createElement('img');
                    img.className = 'flying-image';
                    img.src = IMAGE_URL;
                    img.alt = 'ảnh lừa';
                    img.style.left = Math.random() * 80 + 10 + '%';
                    img.style.top = Math.random() * 80 + 10 + '%';
                    img.style.width = (Math.random() * 100 + 60) + 'px';
                    img.style.height = img.style.width;
                    img.style.animationDuration = (Math.random() * 4 + 3) + 's';
                    img.style.animationDelay = (Math.random() * 2) + 's';
                    document.body.appendChild(img);
                }

                setTimeout(() => {
                    document.querySelectorAll('.flying-text, .flying-image, .overlay-win').forEach(el => el.remove());
                }, 8000);
            }

            function showWastedMessage() {
                const msg = document.createElement('div');
                msg.className = 'wasted-message';
                msg.textContent = '⏳ Chúc mừng bạn đã tốn 5 phút cuộc đời!';
                document.body.appendChild(msg);

                setTimeout(() => {
                    msg.remove();
                }, 6000);
            }

            // ====== RESET ======
            function resetGame() {
                document.querySelectorAll('.flying-text, .flying-image, .overlay-win, .wasted-message').forEach(el => el.remove());
                if (currentCleanup) {
                    currentCleanup();
                    currentCleanup = null;
                }
                currentChallengeIndex = 0;
                completedCount = 0;
                isGameFinished = false;
                actionArea.innerHTML = '';
                resultText.textContent = '🤔 Làm theo hướng dẫn...';
                loadChallenge(0);
            }

            resetBtn.addEventListener('click', resetGame);
            resetGame();
        })();
    </script>
</body>
</html>
